<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Norwegian Miner</title>
    
    <!-- Configurazione PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NO Miner">
    <meta name="theme-color" content="#F2F2F7">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/norway.png">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="android-chrome-192x192.png">

    <style>
        :root {
            --primary: #007AFF;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #1C1C1E;
            --secondary: #8E8E93;
            --success: #34C759;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom) 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container { width: 100%; max-width: 450px; padding-top: 40px; }
        .hidden { display: none !important; }

        /* Schermata Login */
        .auth-card {
            background: var(--card);
            padding: 30px;
            border-radius: 24px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            margin-top: 60px;
        }

        /* UI Elementi */
        .card {
            background: var(--card);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            margin-bottom: 20px;
        }

        h1 { font-size: 24px; font-weight: 800; margin-bottom: 8px; }
        p { color: var(--secondary); margin-bottom: 24px; }

        input {
            width: 100%;
            padding: 16px;
            border: 1px solid #E5E5EA;
            border-radius: 14px;
            font-size: 17px;
            outline: none;
            background: #F8F8F8;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--primary); background: #FFF; }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 14px;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-success { background: var(--success); color: white; margin-top: 20px; }
        button:active { transform: scale(0.98); opacity: 0.9; }

        /* Risultati */
        .label { font-size: 11px; font-weight: 700; color: var(--secondary); text-transform: uppercase; margin-bottom: 4px; }
        .value { font-size: 18px; font-weight: 600; margin-bottom: 16px; }
        .example-box { background: #F8F8FA; padding: 15px; border-radius: 12px; margin-bottom: 10px; }
        
        #loader { text-align: center; padding: 20px; }
        .spinner {
            width: 30px; height: 30px;
            border: 3px solid rgba(0,122,255,0.1);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    
    <!-- Schermata di Autenticazione -->
    <div id="login-screen" class="auth-card">
        <img src="https://img.icons8.com/color/96/norway.png" width="80" style="margin-bottom:15px">
        <h1>Area Privata</h1>
        <p>Inserisci la tua password per accedere al sistema di mining.</p>
        <input type="password" id="password" placeholder="Password" inputmode="text">
        <button class="btn-primary" onclick="checkPassword()">Accedi</button>
    </div>

    <!-- Schermata Principale App -->
    <div id="app-screen" class="hidden">
        <div class="card">
            <h1>🇳🇴 Miner</h1>
            <input type="text" id="wordInput" placeholder="Parola da cercare..." autocomplete="off" inputmode="search">
            <button class="btn-primary" id="searchBtn" onclick="analyze()">Analizza con Gemini</button>
        </div>

        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p style="margin-top:10px">Elaborazione in corso...</p>
        </div>

  <!-- Card dei Risultati -->
  <div id="result-card">
    <div class="info-grid">
      <div class="info-item">
        <div class="info-label">Categoria / Genere</div>
        <div id="resBadge" class="info-value"></div>
      </div>
      <div class="info-item">
        <div class="info-label">Coniugazione / Forme</div>
        <div id="resConj" class="info-value"></div>
      </div>
    </div>

    <h2 id="resWord" class="word-main"></h2>
    <div id="resTrans" class="translation-text"></div>
    
    <div class="section-title">Esempio d'uso</div>
    <div class="example-container">
      <div id="resExNo" class="ex-no"></div>
      <div id="resExIt" class="ex-it"></div>
    </div>

    <div class="section-title">Note e Curiosità</div>
    <div class="notes-container">
      <div id="resNotes" class="notes-text"></div>
    </div>

    <div class="btn-group">
      <button class="btn-action btn-cancel" onclick="reset()">Scarta</button>
      <button class="btn-action btn-save" id="saveBtn" onclick="save()">Salva</button>
    </div>
  </div>
    </div>
</div>

<script>
    // URL del tuo Google Apps Script (Deploy -> Web App)
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwBl6YfsDWRW8HWb3oALvdabsS-yH03qQPPGfIGEF-_uR1o57L4l6eFUPfy3vncvCX7/exec";
    const SECRET_HASH = "d3d0b708cd483dc6d0d7126ad86f63c14ca26960d0e878b96dd4d9722f8a8075"; 
    let currentData = null;

    async function hash(string) {
        const utf8 = new TextEncoder().encode(string);
        const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
        const hashArray = Array.from(new Uint8Array(hashBuffer));
        return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
        
    async function checkPassword() {
        const pwd = document.getElementById('password').value;
        const hashedInput = await hash(pwd);
        const errorMsg = document.getElementById('error-msg');
            
        if (hashedInput === SECRET_HASH) {
            // SALVATAGGIO PERSISTENTE: Usiamo localStorage invece di sessionStorage
            localStorage.setItem('miner_auth_token', hashedInput);
            localStorage.setItem('miner_key', pwd)
            loadApp(pwd);
        } else {
            errorMsg.style.display = 'block';
            document.getElementById('password').value = "";
        }
    }

    function loadApp() {
        document.getElementById('login-screen').classList.add('hidden');
        document.getElementById('app-screen').classList.remove('hidden');
    }

    // Analisi Parola
    async function analyze() {
        const word = document.getElementById('wordInput').value.trim();
        const key = localStorage.getItem('miner_key');
        if (!word) return;

        showLoader(true);
        
        try {
            const url = `${SCRIPT_URL}?action=analyze&word=${encodeURIComponent(word)}&key=${encodeURIComponent(key)}`;
            const response = await fetch(url);
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            currentData = data;
            render(data);
        } catch (e) {
            alert("Errore: " + e.message);
            if (e.message.includes(" Accesso negato")) logout();
        } finally {
            showLoader(false);
        }
    }

    // Salvataggio nel Foglio
    async function save() {
        if (!currentData) return;
        const key = localStorage.getItem('miner_key');
        const btn = document.getElementById('saveBtn');
        
        btn.disabled = true;
        btn.innerText = "Salvataggio...";

        try {
            const response = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({
                    action: "save",
                    key: key,
                    payload: currentData
                })
            });
            const res = await response.json();
            if (res.success) {
                alert("🎉 Salvato con successo!");
                reset();
            } else throw new Error(res.error);
        } catch (e) {
            alert("Errore durante il salvataggio");
            btn.disabled = false;
            btn.innerText = "Salva nel Cloud";
        }
    }

    // UI Helpers
    function render(data) {
        // Gestione fallback per i nuovi campi (nel caso Gemini non li mandi o il backend non sia aggiornato)
        document.getElementById('resBadge').innerText = data.gender || 'n/a';
        document.getElementById('resConj').innerText = data.conjugation || '-';
        document.getElementById('resWord').innerText = data.word || '---';
        document.getElementById('resTrans').innerText = data.translation || 'Non trovata';
        document.getElementById('resExNo').innerText = data.sentence_no || '-';
        document.getElementById('resExIt').innerText = data.sentence_en || '-';
        document.getElementById('resNotes').innerText = data.notes || 'Nessuna nota particolare per questo termine.';
        document.getElementById('result-card').style.display = 'block';
  }

    function reset() {
        document.getElementById('wordInput').value = "";
        document.getElementById('result-card').classList.add('hidden');
        currentData = null;
    }

    function showLoader(show) {
        document.getElementById('loader').classList.toggle('hidden', !show);
        document.getElementById('searchBtn').disabled = show;
        if (show) document.getElementById('result-card').classList.add('hidden');
    }

    function logout() {
        localStorage.removeItem('miner_key');
        location.reload();
    }

    // AUTO-LOGIN: Controlla se esiste già un token salvato nel dispositivo
    window.onload = function() {
        const savedToken = localStorage.getItem('miner_auth_token');
        if (savedToken === SECRET_HASH) {
            loadApp();
        }
    };
</script>

</body>
</html>
